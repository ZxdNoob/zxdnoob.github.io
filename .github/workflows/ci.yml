# =============================================================================
# 持续集成：在 push / PR 时校验前端与后端能否通过 lint、构建与测试。
# =============================================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # 构建阶段不访问真实 API；占位符满足 metadata / 类型检查需要
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_API_URL: https://api.example.com

      - name: Build (GitHub Pages static export)
        run: npm run build:static
        env:
          STATIC_EXPORT: '1'
          NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
          NEXT_PUBLIC_API_URL: https://api.example.com
          API_URL: https://api.example.com

  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
