# =============================================================================
# 阿里云 OSS：把 ECS 上 Docker 卷里的 SQLite（blog.sqlite）备份到对象存储，实现数据云存储化。
# 运行环境：与「Publish backend image」里 SSH 部署为同一台机器（如阿里云 ECS）。
#
# 触发：
#   — publish-backend-image.yml 成功结束后自动运行（workflow_run，链式备份）；
#   — 手动 workflow_dispatch；
#   — 每周日 UTC 02:00（可按需改 cron）。
#
# 与自动部署的关系：
# - 部署仍用 publish-backend-image.yml 的 deploy job（DEPLOY_* Secret）；
# - 将 DEPLOY_HOST 配成 ECS 公网 IP / 域名、放行安全组 SSH 与 API 端口即可。
#
# 本工作流所需 Secret（Repository secrets）：
#   — 与部署共用：DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY
#   — 可选：DEPLOY_SSH_PORT（默认 22）, DEPLOY_VOLUME_NAME（默认 zxdnoob-api-data）
#   — OSS 专用：
#       ALIYUN_OSS_BUCKET        — Bucket 名称
#       ALIYUN_OSS_ENDPOINT      — 如 oss-cn-hangzhou.aliyuncs.com
#       ALIYUN_ACCESS_KEY_ID     — 建议 RAM 子账号，仅授予该 Bucket 写权限
#       ALIYUN_ACCESS_KEY_SECRET
#   — 可选：ALIYUN_OSS_PREFIX    — 对象前缀，默认 blog-api/backups
#
# 安全建议：生产环境优先在 ECS 上使用实例 RAM 角色 + 本仓库 scripts/aliyun-oss-backup.sh
# 的定时任务备份，避免在 GitHub 中长期存放 AK/SK。
# =============================================================================
name: Aliyun OSS backup (SQLite)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'
  workflow_run:
    workflows:
      - publish-backend-image.yml
    types:
      - completed
    branches:
      - main
      - master

concurrency:
  group: aliyun-oss-backup
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  backup:
    name: Upload SQLite to OSS
    runs-on: ubuntu-latest
    if: >-
      ${{ (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      secrets.ALIYUN_OSS_BUCKET != '' && secrets.ALIYUN_OSS_ENDPOINT != '' &&
      secrets.ALIYUN_ACCESS_KEY_ID != '' && secrets.ALIYUN_ACCESS_KEY_SECRET != '' &&
      secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' }}
    steps:
      - name: Backup via SSH (Docker volume → OSS)
        uses: appleboy/ssh-action@v1.2.5
        env:
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX != '' && secrets.ALIYUN_OSS_PREFIX || 'blog-api/backups' }}
          OSS_AK: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_SK: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          VOLUME_NAME: ${{ secrets.DEPLOY_VOLUME_NAME != '' && secrets.DEPLOY_VOLUME_NAME || 'zxdnoob-api-data' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || 22 }}
          envs: OSS_BUCKET,OSS_ENDPOINT,OSS_PREFIX,OSS_AK,OSS_SK,VOLUME_NAME
          script: |
            set -eu
            OSSUTIL="/tmp/ossutil64-ci"
            curl -fsSL -o "$OSSUTIL" "http://gosspublic.alicdn.com/ossutil/ossutil64"
            chmod +x "$OSSUTIL"
            TMP_SQLITE="/tmp/blog-backup-$(date +%s).sqlite"
            docker run --rm \
              -v "${VOLUME_NAME}:/data:ro" \
              -v /tmp:/out \
              alpine:3.20 \
              cp /data/blog.sqlite "/out/$(basename "$TMP_SQLITE")"
            OBJECT_KEY="${OSS_PREFIX}/blog-$(date +%Y%m%d-%H%M%S).sqlite"
            OBJECT_KEY=$(echo "$OBJECT_KEY" | sed 's#//*#/#g; s#^/##')
            "$OSSUTIL" cp "$TMP_SQLITE" "oss://${OSS_BUCKET}/${OBJECT_KEY}" \
              -i "$OSS_AK" \
              -k "$OSS_SK" \
              -e "$OSS_ENDPOINT"
            rm -f "$TMP_SQLITE" "$OSSUTIL"
            echo "OK oss://${OSS_BUCKET}/${OBJECT_KEY}"
