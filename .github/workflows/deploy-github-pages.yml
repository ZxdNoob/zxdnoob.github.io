# =============================================================================
# 将 Next.js 静态导出（out/）通过 GitHub Pages 官方 Actions 部署（见 Deployments）。
#
# 注意：GitHub 不允许在 step/job 的 if: 中直接使用 secrets.*，须先写入 env 再判断。
#
# 数据方案：
# - 默认：Runner 上启动 Nest + SQLite（种子文章），构建期 API_URL=http://127.0.0.1:4000。
# - 可选：在仓库 Secret「PAGES_REMOTE_API_URL」填写公网 API 根 URL，则跳过本地 Nest、从该地址拉数据。
#   不要使用通用名「API_URL」——易与其它环境误配冲突；本工作流也不再读取该 Secret。
#
# Pages：Settings → Build and deployment → Source「GitHub Actions」
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    env:
      # 供 if: 使用（禁止在 if 里写 secrets.*）；1 = 在 Runner 上起 Nest + SQLite
      USE_LOCAL_NEST: ${{ secrets.PAGES_REMOTE_API_URL == '' && '1' || '0' }}
      STATIC_EXPORT: "1"
      NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --max-old-space-size=6144
      API_URL: ${{ secrets.PAGES_REMOTE_API_URL != '' && secrets.PAGES_REMOTE_API_URL || 'http://127.0.0.1:4000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        if: ${{ env.USE_LOCAL_NEST == '1' }}
        run: npm ci --prefix backend

      - name: Build backend
        if: ${{ env.USE_LOCAL_NEST == '1' }}
        run: npm run build --prefix backend

      - name: Start API (SQLite + seed) and wait for health
        if: ${{ env.USE_LOCAL_NEST == '1' }}
        run: |
          set -e
          cd backend
          mkdir -p data
          nohup env PORT=4000 DATABASE_PATH=./data/ci-github-pages.sqlite npm run start:prod \
            > "${GITHUB_WORKSPACE}/api.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/api.pid"
          cd "${GITHUB_WORKSPACE}"
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:4000/api/health > /dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start; last log lines:"
          tail -80 api.log || true
          exit 1

      - name: Build (static export from API / DB)
        run: npm run build:static

      - name: Verify static export received post data
        run: |
          set -e
          if find out/blog -maxdepth 1 -name '*.html' ! -name '*__static-export-placeholder__*' -print -quit | grep -q .; then
            echo "Static blog pages OK"
          else
            echo "::error::No post HTML under out/blog (only placeholder). Build could not reach API during SSG — check PAGES_REMOTE_API_URL or API logs."
            exit 1
          fi

      - name: Stop local API
        if: ${{ always() && env.USE_LOCAL_NEST == '1' }}
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" 2>/dev/null || true; fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
