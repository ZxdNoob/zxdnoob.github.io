# =============================================================================
# 将 Next.js 静态导出（out/）部署到 GitHub Pages（用户站：https://<user>.github.io/）。
#
# 仓库 Settings → Pages → Build and deployment：Source 选「GitHub Actions」。
# 可选 Secrets：API_URL 或 NEXT_PUBLIC_API_URL — 构建时拉取线上 Nest API 的文章与 changelog。
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build:static
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
          API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
