# =============================================================================
# 将 Next.js 静态导出（out/）部署到 GitHub Pages（用户站：https://<user>.github.io/）。
#
# 仓库 Settings → Pages → Build and deployment：Source 选「GitHub Actions」。
# 可选 Secrets：API_URL 或 NEXT_PUBLIC_API_URL — 构建时拉取线上 Nest API 的文章与 changelog。
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# 显式声明 permissions 时，未列出的 scope 为 none；上传 Pages 构件需要 actions: write
# 参考：https://docs.github.com/actions/security-guides/automatic-token-authentication
permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  # 避免取消进行中的生产部署（与官方 Pages 模板一致）
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build:static
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: --max-old-space-size=6144
          API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
          # 默认会排除以 . 开头的文件，须包含 public/.nojekyll，否则 Pages 仍可能走 Jekyll
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
