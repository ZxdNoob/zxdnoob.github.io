# =============================================================================
# 将 Next.js 静态导出（out/）通过 GitHub Pages 官方 Actions 部署（见 Deployments）。
#
# 数据方案（尽量走数据库）：
# - 默认：在 Runner 上 build 后端、启动 Nest + SQLite（临时库），Next 构建期通过
#   API_URL=http://127.0.0.1:4000 从数据库读文章与 changelog，再导出静态页。
# - 仅当配置了 Secret「API_URL」且非空：跳过本地起 API，构建时向该地址拉数据（长期部署的 Nest）。
#   注意：不要用「NEXT_PUBLIC_API_URL」参与此逻辑——该变量常误配或指向浏览器侧地址，
#   会导致跳过本地 API 而构建期拉取失败，Pages 上出现「暂无文章」。
#
# Pages：Settings → Build and deployment → Source 选「GitHub Actions」（不要只用「从分支部署」
# 却依赖本工作流；若选分支，应选 gh-pages 且需其它方式推送到该分支）。
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    env:
      STATIC_EXPORT: "1"
      NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --max-old-space-size=6144
      API_URL: ${{ secrets.API_URL != '' && secrets.API_URL || 'http://127.0.0.1:4000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        if: ${{ secrets.API_URL == '' }}
        run: npm ci --prefix backend

      - name: Build backend
        if: ${{ secrets.API_URL == '' }}
        run: npm run build --prefix backend

      - name: Start API (SQLite + seed) and wait for health
        if: ${{ secrets.API_URL == '' }}
        run: |
          set -e
          cd backend
          mkdir -p data
          nohup env PORT=4000 DATABASE_PATH=./data/ci-github-pages.sqlite npm run start:prod \
            > "${GITHUB_WORKSPACE}/api.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/api.pid"
          cd "${GITHUB_WORKSPACE}"
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:4000/api/health > /dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start; last log lines:"
          tail -80 api.log || true
          exit 1

      - name: Build (static export from API / DB)
        run: npm run build:static

      - name: Verify static export received post data
        run: |
          set -e
          if find out/blog -maxdepth 1 -name '*.html' ! -name '*__static-export-placeholder__*' -print -quit | grep -q .; then
            echo "Static blog pages OK"
          else
            echo "::error::No post HTML under out/blog (only placeholder). Build could not reach API during SSG — check API_URL secret or local API logs."
            exit 1
          fi

      - name: Stop local API
        if: ${{ always() && secrets.API_URL == '' }}
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" 2>/dev/null || true; fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
