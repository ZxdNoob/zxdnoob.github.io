# =============================================================================
# 将 Next.js 静态导出（out/）推送到 gh-pages 分支，由 GitHub Pages 从该分支发布。
#
# 适用于：Settings → Pages 为「Deploy from a branch」且分支为 gh-pages 时；
# 可避免 deploy-pages 与「仅允许 gh-pages」环境策略冲突导致的 400。
#
# 仓库 Settings → Pages：Build and deployment → Source「Deploy from a branch」→ Branch「gh-pages」/「/ (root)」。
# 可选 Secrets：API_URL 或 NEXT_PUBLIC_API_URL — 构建时拉取线上 Nest API。
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build:static
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: --max-old-space-size=6144
          API_URL: ${{ secrets.API_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Push out/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # 单提交历史，避免 gh-pages 分支无限增大
          force_orphan: true
