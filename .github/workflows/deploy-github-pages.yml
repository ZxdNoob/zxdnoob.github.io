# =============================================================================
# 将 Next.js 静态导出（out/）推送到 gh-pages 分支，由 GitHub Pages 从该分支发布。
#
# 数据方案（尽量走数据库）：
# - 默认：在 Runner 上 build 后端、启动 Nest + SQLite（临时库），Next 构建期通过
#   API_URL=http://127.0.0.1:4000 从数据库读文章与 changelog，再导出静态页。
# - 若仓库配置了 Secret「API_URL」或「NEXT_PUBLIC_API_URL」且非空：跳过本地起 API，
#   构建时使用该地址（适用于把 Nest + DB 长期部署在其它主机的情况）。
#
# Pages：Settings → Build and deployment → Source「Deploy from a branch」→ gh-pages / (root)
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to gh-pages
    runs-on: ubuntu-latest
    env:
      STATIC_EXPORT: "1"
      NEXT_PUBLIC_SITE_URL: https://zxdnoob.github.io
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --max-old-space-size=6144
      # 有远程 API Secret 时用 Secret，否则用本 job 内启动的本地 API
      API_URL: ${{ secrets.API_URL != '' && secrets.API_URL || secrets.NEXT_PUBLIC_API_URL != '' && secrets.NEXT_PUBLIC_API_URL || 'http://127.0.0.1:4000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        if: ${{ secrets.API_URL == '' && secrets.NEXT_PUBLIC_API_URL == '' }}
        run: npm ci --prefix backend

      - name: Build backend
        if: ${{ secrets.API_URL == '' && secrets.NEXT_PUBLIC_API_URL == '' }}
        run: npm run build --prefix backend

      - name: Start API (SQLite + seed) and wait for health
        if: ${{ secrets.API_URL == '' && secrets.NEXT_PUBLIC_API_URL == '' }}
        run: |
          set -e
          cd backend
          mkdir -p data
          nohup env PORT=4000 DATABASE_PATH=./data/ci-github-pages.sqlite npm run start:prod \
            > "${GITHUB_WORKSPACE}/api.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/api.pid"
          cd "${GITHUB_WORKSPACE}"
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:4000/api/health > /dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start; last log lines:"
          tail -80 api.log || true
          exit 1

      - name: Build (static export from API / DB)
        run: npm run build:static

      - name: Stop local API
        if: ${{ always() && secrets.API_URL == '' && secrets.NEXT_PUBLIC_API_URL == '' }}
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" 2>/dev/null || true; fi

      - name: Push out/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
